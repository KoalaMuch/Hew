name: Deploy to VPS

on:
  workflow_dispatch:

jobs:
  check-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI passed on HEAD
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checkSuites } = await github.rest.checks.listSuitesForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });

            const ciSuite = checkSuites.check_suites.find(
              (s) => s.app?.slug === 'github-actions' && s.conclusion === 'success'
            );

            if (!ciSuite) {
              core.setFailed(
                `CI has not passed for commit ${context.sha.slice(0, 7)}. ` +
                `Push to main and wait for CI to complete before deploying.`
              );
            }

  deploy:
    needs: check-ci
    runs-on: ubuntu-latest
    environment: VPS
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/hew
            git pull origin main
            ./deploy.sh

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    environment: VPS
    steps:
      - name: Wait for services to stabilize
        run: sleep 15

      - name: Health check API
        run: |
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.VPS_HEALTH_URL }}" || echo "000")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 10 attempts"
          exit 1
