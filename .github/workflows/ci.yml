name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @hew/db db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker:
    needs: lint-typecheck-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: runtime-api
            tag: hew-api
            smoke: "node -e \"require('fs').accessSync('apps/api/dist/main.js'); console.log('API entry OK')\""
          - target: runtime-web
            tag: hew-web
            smoke: "node -e \"require('fs').accessSync('apps/web/server.js'); console.log('Web entry OK')\""
          - target: runtime-worker
            tag: hew-worker
            smoke: "node -e \"require('fs').accessSync('apps/worker/dist/main.js'); console.log('Worker entry OK')\""
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.tag }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: false
          load: true
          tags: ${{ matrix.tag }}:latest
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Smoke test ${{ matrix.tag }}
        run: docker run --rm ${{ matrix.tag }}:latest sh -c '${{ matrix.smoke }}'
