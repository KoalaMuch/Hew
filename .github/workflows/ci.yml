name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hew_test
          POSTGRES_PASSWORD: hew_test
          POSTGRES_DB: hew_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hew_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://hew_test:hew_test@localhost:5432/hew_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @hew/db db:generate

      - name: Run database migrations
        run: pnpm --filter @hew/db exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Integration tests
        run: pnpm --filter @hew/api test:integration

      - name: Build
        run: pnpm build

  docker:
    needs: lint-typecheck-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - target: runtime-api
            tag: hew-api
            entry: apps/api/dist/main.js
          - target: runtime-web
            tag: hew-web
            entry: apps/web/server.js
          - target: runtime-worker
            tag: hew-worker
            entry: apps/worker/dist/main.js
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.tag }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: false
          load: true
          tags: ${{ matrix.tag }}:latest
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Smoke test ${{ matrix.tag }}
        run: docker run --rm --entrypoint node ${{ matrix.tag }}:latest -e "require('fs').accessSync('${{ matrix.entry }}'); console.log('OK')"

      - name: Push ${{ matrix.tag }} to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/koalamuch/${{ matrix.tag }}:latest
            ghcr.io/koalamuch/${{ matrix.tag }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.target }}
