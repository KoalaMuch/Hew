name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @hew/db db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker:
    needs: lint-typecheck-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          load: true
          tags: hew-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: false
          load: true
          tags: hew-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: false
          load: true
          tags: hew-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test API image
        run: |
          docker run --rm hew-api:latest node -e "require('./apps/api/dist/main.js')" &
          sleep 3
          docker ps
          echo "API image loads successfully"

      - name: Smoke test Web image
        run: |
          docker run --rm -e PORT=3001 hew-web:latest node -e "
            const path = require('path');
            const serverPath = path.join(process.cwd(), 'apps/web/server.js');
            require('fs').accessSync(serverPath);
            console.log('server.js exists at', serverPath);
          "
          echo "Web image verified successfully"

      - name: Smoke test Worker image
        run: |
          docker run --rm hew-worker:latest node -e "
            const path = require('path');
            const mainPath = path.join(process.cwd(), 'apps/worker/dist/main.js');
            require('fs').accessSync(mainPath);
            console.log('main.js exists at', mainPath);
          "
          echo "Worker image verified successfully"
