services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hew_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hew_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hew_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hew_network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hew_network

  api:
    image: ghcr.io/koalamuch/hew-api:latest
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-hew_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hew_prod}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - hew_network

  web:
    image: ghcr.io/koalamuch/hew-web:latest
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - hew_network

  worker:
    image: ghcr.io/koalamuch/hew-worker:latest
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-hew_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hew_prod}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hew_network

volumes:
  pgdata:
  redisdata:

networks:
  hew_network:
    driver: bridge
