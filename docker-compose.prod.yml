services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hew_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hew_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hew_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hew_network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hew_network

  api:
    image: ghcr.io/koalamuch/hew-api:latest
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-hew_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hew_prod}
      - REDIS_URL=redis://redis:6379
      - API_BASE_URL=${API_BASE_URL:-https://api.rubhew.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - hew_network

  web:
    image: ghcr.io/koalamuch/hew-web:latest
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_URL=${API_URL:-https://api.rubhew.com/api}
      - FARO_URL=${FARO_URL:-}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - hew_network

  worker:
    image: ghcr.io/koalamuch/hew-worker:latest
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-hew_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hew_prod}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hew_network

  # ─── Monitoring Stack ─────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - hew_network

  loki:
    image: grafana/loki:3.1.0
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    restart: unless-stopped
    networks:
      - hew_network

  tempo:
    image: grafana/tempo:2.5.0
    command: -config.file=/etc/tempo/config.yml
    volumes:
      - ./monitoring/tempo/tempo-config.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped
    networks:
      - hew_network

  alloy:
    image: grafana/alloy:v1.3.1
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "127.0.0.1:12347:12347"
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-hew_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hew_prod}
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped
    networks:
      - hew_network

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped
    networks:
      - hew_network

volumes:
  pgdata:
  redisdata:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

networks:
  hew_network:
    driver: bridge
